
services:
  postgres-dwh:
    image: postgres:15-alpine
    container_name: nyc_taxi_dwh
    environment:
      POSTGRES_USER: data_engineer
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: nyc_weather_taxi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U data_engineer -d nyc_weather_taxi"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - data-network

  db-init:
    image: postgres:15-alpine
    depends_on:
      postgres-dwh:
        condition: service_healthy
    volumes:
      - ./src/db/schema.sql:/schema.sql:ro
    command: psql -h postgres-dwh -U data_engineer -d nyc_weather_taxi -f /schema.sql
    environment:
      PGPASSWORD: password123
    networks:
      - data-network

  etl-runner:
    build:
      context: .
      dockerfile: docker/Dockerfile.etl
    image: custom-pyspark-etl-lean
    container_name: pyspark_etl
    volumes:
      - ./src:/app/src
      - ./main.py:/app/main.py
      - ./geo:/app/geo
    working_dir: /app
    depends_on:
      postgres-dwh:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    networks:
      - data-network

  geojson:
    # Serves the repaired NYC taxi-zone GeoJSON to Metabase's custom map at
    # http://geojson/taxi_zones.geojson (run src.reporting.prepare_geojson first).
    image: nginx:alpine
    container_name: nyc_taxi_geojson
    volumes:
      - ./geo:/usr/share/nginx/html:ro
    ports:
      - "8088:80"
    networks:
      - data-network

  metabase:
    image: metabase/metabase:v0.49.13
    container_name: nyc_taxi_metabase
    ports:
      - "3000:3000"
    environment:
      # Use the embedded H2 app DB, persisted to a named volume (dev-only).
      MB_DB_FILE: /metabase-data/metabase.db
      JAVA_TIMEZONE: America/New_York
    volumes:
      - metabase-data:/metabase-data
    depends_on:
      postgres-dwh:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - data-network

volumes:
  pgdata:
  metabase-data:

networks:
  data-network:
    driver: bridge
